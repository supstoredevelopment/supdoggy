<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupStore - Asset Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --accent: #00d4ff;
            --dark: #000000;
            --light: #ffffff;
            --text-dark: #ffffff;
            --text-light: #000000;
            --subtext-dark: rgba(255, 255, 255, 0.6);
            --subtext-light: rgba(0, 0, 0, 0.6);
            --glass-bg-dark: rgba(255, 255, 255, 0.05);
            --glass-bg-light: rgba(0, 0, 0, 0.05);
            --glass-border-dark: rgba(255, 255, 255, 0.1);
            --glass-border-light: rgba(0, 0, 0, 0.1);
            --bg-rgb-dark: 0, 0, 0;
            --bg-rgb-light: 255, 255, 255;
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --shadow-light: rgba(0, 0, 0, 0.1);
            --transition-fast: 0.3s ease;
            --transition-medium: 0.4s ease;
            --blur-extra-large: 30px;
            --border-radius-medium: 12px;
            --border-radius-large: 20px;
            --spacing-medium: 1rem;
            --spacing-large: 2rem;
            --spacing-extra-large: 3rem;
        }

        [data-theme="dark"] {
            --bg: var(--dark);
            --text: var(--text-dark);
            --subtext: var(--subtext-dark);
            --glass-bg: var(--glass-bg-dark);
            --glass-border: var(--glass-border-dark);
            --bg-rgb: var(--bg-rgb-dark);
            --shadow: var(--shadow-dark);
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-hover-bg: rgba(255, 255, 255, 0.08);
        }

        [data-theme="light"] {
            --bg: var(--light);
            --text: var(--text-light);
            --subtext: var(--subtext-light);
            --glass-bg: var(--glass-bg-light);
            --glass-border: var(--glass-border-light);
            --bg-rgb: var(--bg-rgb-light);
            --shadow: var(--shadow-light);
            --card-bg: rgba(0, 0, 0, 0.03);
            --card-hover-bg: rgba(0, 0, 0, 0.06);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background var(--transition-fast), color var(--transition-fast);
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(var(--bg-rgb), 0.5);
            backdrop-filter: blur(var(--blur-extra-large)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-extra-large)) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 1.2rem 0;
            transition: all var(--transition-medium);
        }

        nav.scrolled {
            background: rgba(var(--bg-rgb), 0.8);
            padding: 0.9rem 0;
            box-shadow: 0 8px 32px var(--shadow);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--spacing-extra-large);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-icon {
            position: relative;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
        }

        .cart-icon span {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--accent);
            color: var(--dark);
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform var(--transition-fast);
        }

        input[type="checkbox"]:checked+.toggle-switch {
            background: var(--primary);
        }

        input[type="checkbox"]:checked+.toggle-switch::before {
            transform: translateX(26px);
        }

        /* ── ASSET DETAIL ── */
        .asset-detail {
            padding: 120px var(--spacing-extra-large) 80px;
            min-height: 100vh;
        }

        .asset-detail-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-extra-large);
            align-items: start;
            margin-bottom: 80px;
        }

        .asset-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-large);
            padding: var(--spacing-large);
            min-height: 500px;
        }

        .asset-image {
            width: 100%;
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: var(--border-radius-medium);
        }

        .asset-info {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-large);
        }

        .asset-header {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-medium);
        }

        .asset-tag {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            width: fit-content;
        }

        .asset-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
        }

        .asset-description {
            font-size: 1.05rem;
            color: var(--subtext);
            line-height: 1.8;
        }

        .asset-price {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent);
            margin: var(--spacing-medium) 0;
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-medium);
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: var(--border-radius-medium);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--light);
        }

        .btn-primary:hover {
            background: #0052cc;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* ── RECOMMENDED SECTION ── */
        .recommended-section {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 var(--spacing-extra-large);
        }

        .recommended-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            gap: 1rem;
        }

        .recommended-head-text h3 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .recommended-head-text p {
            color: var(--subtext);
            font-size: 0.95rem;
            margin-top: 0.2rem;
        }

        /* arrow buttons beside the heading */
        .carousel-arrows {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .carousel-arrow-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all var(--transition-fast);
        }

        .carousel-arrow-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            transform: scale(1.08);
        }

        /* track wrapper — clips overflow */
        .carousel-track-wrapper {
            overflow: hidden;
            position: relative;
        }

        /* gradient fade edges */
        .carousel-track-wrapper::before,
        .carousel-track-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 60px;
            z-index: 2;
            pointer-events: none;
        }

        .carousel-track-wrapper::before {
            left: 0;
            background: linear-gradient(to right, var(--bg), transparent);
        }

        .carousel-track-wrapper::after {
            right: 0;
            background: linear-gradient(to left, var(--bg), transparent);
        }

        .carousel-track {
            display: flex;
            gap: 1rem;
            transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
            will-change: transform;
        }

        /* ── CAROUSEL CARD ── */
        .carousel-card {
            flex: 0 0 200px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .carousel-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 102, 255, 0.25);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .carousel-card-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
            position: relative;
        }

        .carousel-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .carousel-card:hover .carousel-card-thumb img {
            transform: scale(1.08);
        }

        /* tag badge on image */
        .card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent);
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            backdrop-filter: blur(8px);
            letter-spacing: 0.3px;
        }

        .carousel-card-body {
            padding: 0.85rem 0.9rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
        }

        .carousel-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .carousel-card-price {
            font-size: 1rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: auto;
            padding-top: 0.4rem;
        }

        /* dot indicators */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 1.4rem;
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--glass-border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .carousel-dot.active {
            background: var(--primary);
            width: 20px;
            border-radius: 3px;
        }

        /* ── FOOTER ── */
        footer {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(var(--blur-extra-large));
            padding: 60px var(--spacing-extra-large) 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr repeat(3, 1fr);
            gap: 4rem;
            margin-bottom: var(--spacing-extra-large);
        }

        .footer-section h4 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links a {
            color: var(--subtext);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        /* ── MISC ── */
        .success-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            animation: slideIn 0.3s ease forwards;
            z-index: 2000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1024px) {
            .asset-detail-wrapper {
                grid-template-columns: 1fr;
                gap: var(--spacing-large);
            }

            .asset-title {
                font-size: 2rem;
            }

            .asset-price {
                font-size: 2.5rem;
            }

            .carousel-card {
                flex: 0 0 180px;
            }
        }

        @media (max-width: 768px) {
            .asset-detail {
                padding: 100px 1.5rem 60px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                min-width: unset;
            }

            .asset-image-container {
                min-height: 300px;
                padding: var(--spacing-medium);
            }

            .asset-image {
                max-height: 300px;
            }

            .recommended-section {
                padding: 0 1.5rem;
            }

            .carousel-card {
                flex: 0 0 160px;
            }
        }

        @media (max-width: 480px) {
            .asset-detail {
                padding: 80px 1rem 40px;
            }

            .asset-title {
                font-size: 1.6rem;
            }

            .asset-price {
                font-size: 2rem;
            }

            .carousel-card {
                flex: 0 0 145px;
            }

            .recommended-section {
                padding: 0 1rem;
            }

            .nav-container {
                padding: 0 1rem;
            }
        }
    </style>
</head>

<body data-theme="dark">
    <nav id="nav">
        <div class="nav-container">
            <a href="/" class="logo">SupStore</a>
            <div class="nav-actions">
                <a href="/p/cart" class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartCount">0</span>
                </a>
                <div class="theme-toggle">
                    <input type="checkbox" id="themeSwitch" hidden>
                    <label for="themeSwitch" class="toggle-switch"></label>
                </div>
            </div>
        </div>
    </nav>

    <section class="asset-detail">
        <div id="assetDetailContainer"></div>
    </section>

    <!-- ── RECOMMENDED SECTION ── -->
    <section id="recommendedSection" style="display:none;">
        <div class="recommended-section">
            <div class="recommended-head">
                <div class="recommended-head-text">
                    <h3>Recommended For You</h3>
                    <p>More assets that go great with this one</p>
                </div>
                <div class="carousel-arrows">
                    <button class="carousel-arrow-btn" id="prevBtn" aria-label="Previous">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="carousel-arrow-btn" id="nextBtn" aria-label="Next">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <div class="carousel-track-wrapper">
                <div class="carousel-track" id="carouselTrack"></div>
            </div>

            <div class="carousel-dots" id="carouselDots"></div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>SupStore</h4>
                <p style="color:var(--subtext);">Premium game assets for developers.</p>
            </div>
            <div class="footer-section">
                <h4>Products</h4>
                <ul class="footer-links">
                    <li><a href="#">3D Models</a></li>
                    <li><a href="#">UI Kits</a></li>
                    <li><a href="#">Game Systems</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Legal</h4>
                <ul class="footer-links">
                    <li><a href="#">Terms</a></li>
                    <li><a href="#">Privacy</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Resources</h4>
                <ul class="footer-links">
                    <li><a href="#">Discord</a></li>
                    <li><a href="#">Support</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        /* ────────────────────────────────────
           CAROUSEL ENGINE
        ──────────────────────────────────── */
        const CARD_WIDTH = 200;  // px  (must match CSS flex-basis)
        const CARD_GAP = 16;   // px  (1rem)
        const CARDS_PER_PAGE = 5;  // how many cards to jump per arrow click

        let carouselIndex = 0;
        let maxCarouselIndex = 0;
        let totalCards = 0;

        function buildCarousel(assets) {
            const track = document.getElementById('carouselTrack');
            const dotsEl = document.getElementById('carouselDots');
            const section = document.getElementById('recommendedSection');

            track.innerHTML = '';
            dotsEl.innerHTML = '';

            assets.forEach(asset => {
                const a = document.createElement('a');
                a.className = 'carousel-card';
                a.href = `/p/asset/?id=${encodeURIComponent(asset.id)}`;
                a.innerHTML = `
                    <div class="carousel-card-thumb">
                        <img src="${asset.image_url}" alt="${asset.title}" loading="lazy">
                        ${asset.tag ? `<span class="card-badge">${asset.tag}</span>` : ''}
                    </div>
                    <div class="carousel-card-body">
                        <div class="carousel-card-title">${asset.title}</div>
                        <div class="carousel-card-price">$${asset.price.toLocaleString()}</div>
                    </div>
                `;
                track.appendChild(a);
            });

            totalCards = assets.length;
            maxCarouselIndex = Math.max(0, totalCards - CARDS_PER_PAGE);

            // dots = one per page
            const pages = Math.ceil(totalCards / CARDS_PER_PAGE);
            for (let i = 0; i < pages; i++) {
                const dot = document.createElement('span');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToPage(i));
                dotsEl.appendChild(dot);
            }

            section.style.display = 'block';
            updateCarouselPosition();
        }

        function goToPage(pageIndex) {
            carouselIndex = Math.min(pageIndex * CARDS_PER_PAGE, maxCarouselIndex);
            updateCarouselPosition();
        }

        function updateCarouselPosition() {
            const track = document.getElementById('carouselTrack');
            const offset = carouselIndex * (CARD_WIDTH + CARD_GAP);
            track.style.transform = `translateX(-${offset}px)`;

            // sync dots
            const dots = document.querySelectorAll('.carousel-dot');
            const page = Math.round(carouselIndex / CARDS_PER_PAGE);
            dots.forEach((d, i) => d.classList.toggle('active', i === page));
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            carouselIndex = Math.max(0, carouselIndex - CARDS_PER_PAGE);
            updateCarouselPosition();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            carouselIndex = Math.min(maxCarouselIndex, carouselIndex + CARDS_PER_PAGE);
            updateCarouselPosition();
        });

        /* ────────────────────────────────────
           CART HELPERS
        ──────────────────────────────────── */
        let selectedAsset = null;

        function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
        function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }
        function updateCartCount() { document.getElementById('cartCount').textContent = getCart().length; }

        function addToCart() {
            if (!selectedAsset) return;
            const cart = getCart();
            if (!cart.find(i => i.id === selectedAsset.id)) {
                cart.push({ id: selectedAsset.id, title: selectedAsset.title, price: selectedAsset.price, image_url: selectedAsset.image_url, stripe_price_id: selectedAsset.stripe_price_id });
                saveCart(cart);
                showSuccess('Added to cart!');
            } else {
                showSuccess('Already in cart!');
            }
        }

        function buyNow() {
            if (!selectedAsset) return;
            const cart = getCart();
            if (!cart.find(i => i.id === selectedAsset.id)) {
                cart.push({ id: selectedAsset.id, title: selectedAsset.title, price: selectedAsset.price, image_url: selectedAsset.image_url, stripe_price_id: selectedAsset.stripe_price_id });
                saveCart(cart);
            }
            window.location.href = '/p/cart';
        }

        function showSuccess(message) {
            const msg = document.createElement('div');
            msg.className = 'success-message';
            msg.textContent = message;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        /* ────────────────────────────────────
           ASSET LOADING
        ──────────────────────────────────── */
        async function fetchAsset(id) {
            const res = await fetch(`/api/assets/${id}`);
            if (!res.ok) throw new Error('Failed to load asset');
            return await res.json();
        }

        async function fetchRecommended() {
            const res = await fetch('/api/assets?limit=20');
            if (!res.ok) return [];
            const json = await res.json();
            return Array.isArray(json.data) ? json.data : [];
        }

        async function loadAsset() {
            const container = document.getElementById('assetDetailContainer');
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                container.innerHTML = '<p style="text-align:center;color:var(--subtext);padding:2rem;">No asset ID provided. <a href="/p/assets">Back to all assets</a></p>';
                return;
            }

            try {
                const asset = await fetchAsset(id);
                selectedAsset = asset;

                container.innerHTML = `
                    <div class="asset-detail-wrapper">
                        <div class="asset-image-container">
                            <img class="asset-image" src="${asset.image_url}" alt="${asset.title}">
                        </div>
                        <div class="asset-info">
                            <div class="asset-header">
                                <span class="asset-tag">${asset.tag || 'Asset'}</span>
                                <h1 class="asset-title">${asset.title}</h1>
                                <p class="asset-description">${asset.description}</p>
                            </div>
                            <div class="asset-price">$${asset.price.toLocaleString()}</div>
                            <div class="action-buttons">
                                <button class="btn btn-primary" onclick="buyNow()">
                                    <i class="fas fa-bolt"></i> Buy Now
                                </button>
                                <button class="btn btn-secondary" onclick="addToCart()">
                                    <i class="fas fa-cart-plus"></i> Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                // Load recommended
                let recs = await fetchRecommended();
                recs = recs.filter(a => a.id !== asset.id).slice(0, 15);
                if (recs.length > 0) buildCarousel(recs);

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="text-align:center;color:var(--subtext);">Error loading asset. Please try again.</p>';
            }
        }

        /* ────────────────────────────────────
           THEME + SCROLL
        ──────────────────────────────────── */
        const themeSwitch = document.getElementById('themeSwitch');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.body.dataset.theme = currentTheme;
        themeSwitch.checked = currentTheme === 'light';
        themeSwitch.addEventListener('change', e => {
            const t = e.target.checked ? 'light' : 'dark';
            document.body.dataset.theme = t;
            localStorage.setItem('theme', t);
        });

        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));

        window.addEventListener('load', () => { loadAsset(); updateCartCount(); });
    </script>
</body>

</html>
